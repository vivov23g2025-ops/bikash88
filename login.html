<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>লগইন - BIKASH88</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

<div class="auth-container">
    <div class="auth-header">
        <h2>BIKASH88-এ আপনাকে স্বাগতম</h2>
        <a href="Index.html" class="close-btn">✕</a>
    </div>

    <form class="auth-form" action="Index.html">
        <div class="form-group">
            <label>ব্যবহারকারীর নাম *</label>
            <input type="text" placeholder="এখানে পূরণ করুন" required>
        </div>

        <div class="form-group">
            <label>পাসওয়ার্ড *</label>
            <input type="password" placeholder="এখানে পূরণ করুন" required>
        </div>

        <div class="forgot-pass">
            <a href="#">পাসওয়ার্ড ভুলে গেছেন</a>
        </div>

        <button type="submit" class="auth-btn">প্রবেশ করুন</button>

        <p class="switch-page">
            অ্যাকাউন্ট নেই? <a href="register-step1.html">নিবন্ধন</a>
        </p>
    </form>
</div>

</body>
</html>
