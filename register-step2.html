<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>রেজিস্ট্রেশন (ধাপ ২) - BIKASH88</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

<div class="auth-container">
    <div class="stepper">
        <div class="step complete">1</div>
        <div class="line complete"></div>
        <div class="step active">2</div>
        <div class="line"></div>
        <div class="step">✓</div>
    </div>

    <form class="auth-form" action="login.html" method="POST">
        <div class="form-group">
            <label>মুদ্রা <span>*</span></label>
            <select class="reg-select-field">
                <option value="BDT">BDT</option>
            </select>
        </div>

        <div class="form-group">
            <label>মোবাইল নম্বর <span>*</span></label>
            <div class="reg-phone-row">
                <div class="reg-flag-box">🇧🇩 +880</div>
                <input type="tel" placeholder="Phone Number" required style="flex: 1;">
            </div>
        </div>

        <div class="form-group">
            <label>ইমেইল</label>
            <input type="email" placeholder="Fill in Email (Optional)">
        </div>

        <div class="form-group">
            <label>রেফারেল কোড</label>
            <input type="text" placeholder="Fill in Referral Code (Optional)">
        </div>

        <div class="form-group checkbox-group">
            <input type="checkbox" id="terms" required>
            <label for="terms" class="label-inline">আমি আইনি বয়সী এবং আমি এর সাথে একমত শর্তাবলী</label>
        </div>

        <div class="btn-group-row">
            <a href="register-step1.html" class="auth-btn btn-back">পেছনে</a>
            <button type="submit" class="auth-btn btn-submit">সম্পূর্ণ</button>
        </div>
    </form>
</div>

</body>
</html>
