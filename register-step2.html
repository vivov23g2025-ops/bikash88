<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>নিবন্ধন - ধাপ ২ - BIKASH88</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

<div class="auth-container">

    <div class="stepper">
        <div class="step">১</div>
        <div class="line"></div>
        <div class="step active">২</div>
        <div class="line"></div>
        <div class="step">✓</div>
    </div>

    <form class="auth-form" action="registration-success.html" method="POST">

        <label for="phone">মোবাইল নাম্বার *</label>
        <input type="tel" id="phone" name="phone" placeholder="আপনার মোবাইল নাম্বার" required>

        <label for="verification-code">যাচাইকরণ কোড (OTP) *</label>
        <input type="text" id="verification-code" name="otp" placeholder="কোডটি এখানে দিন" required>

        <button type="submit" class="auth-btn">নিবন্ধন সম্পন্ন করুন</button>

        <p class="switch-page">
            ইতিমধ্যে একটি সদস্যপদ আছে? 
            <a href="login.html">প্রবেশ করুন</a>
        </p>

    </form>

</div>

</body>
</html>
