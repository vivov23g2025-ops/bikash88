<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>রেজিস্ট্রেশন (ধাপ ১) - BIKASH88</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

<div class="auth-container">
    <div class="stepper">
        <div class="step active">1</div>
        <div class="line"></div>
        <div class="step">2</div>
        <div class="line"></div>
        <div class="step">✓</div>
    </div>

    <form class="auth-form" action="register-step2.html" method="GET">
        <div class="form-group">
            <label>ব্যবহারকারীর নাম <span>*</span></label>
            <input type="text" placeholder="কমপক্ষে 6 থেকে 13 টি অক্ষর থাকতে হবে।" required>
        </div>

        <div class="form-group">
            <label>পাসওয়ার্ড <span>*</span></label>
            <input type="password" placeholder="Fill in password" required>
        </div>

        <div class="form-group">
            <label>পাসওয়ার্ড নিশ্চিত করুন <span>*</span></label>
            <input type="password" placeholder="Confirm password" required>
        </div>

        <button type="submit" class="auth-btn">Continue</button>

        <p class="switch-page">
            ইতিমধ্যে একটি সদস্যপদ আছে? <a href="login.html">প্রবেশ করুন</a>
        </p>
    </form>
</div>

</body>
</html>
